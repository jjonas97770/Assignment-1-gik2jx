<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>GIS Uppgift 1, 2 & 3</title>

    <!--
    Leaflet CSS – innehåller alla stilar som Leaflet behöver för att
    rita kartan korrekt, t.ex. zoomknappar, popups och markörer.
    Måste laddas innan Leaflet JS annars ser kartan trasig ut.
  -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!--
    Turf.js – ett geografiskt beräkningsbibliotek för JavaScript.
    Används för att:
      1. Skapa buffertzoner (cirklar) runt punkter på kartan
      2. Kontrollera om två ytor geografiskt överlappar varandra
    Utan Turf.js skulle dessa beräkningar kräva komplex matematik
    för att hantera jordens krökning.
  -->
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />

    <style>
      /*
      Tar bort webbläsarens standardmarginaler så att kartan
      kan fylla hela fönstret utan vita kanter runt om.
    */
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
      }

      /*
      Kartan tar upp hela webbläsarens höjd (100vh = 100% av fönsterhöjden).
      flex: 1 gör att kartan fyller all tillgänglig bredd bredvid sidebaren.
    */
      #map {
        height: 100vh;
        flex: 1;
      }

      /*
      Sidebaren är en fast panel på höger sida av skärmen.
      Den visar detaljerad information om de 5 valda platserna i Task 2.
      overflow-y: auto lägger till en scrollbar om innehållet är längre än fönstret.
      display: none gör att den är dold tills användaren klickar på knappen.
    */
      #sidebar {
        width: 300px;
        height: 100vh;
        background: #f9f9f9;
        border-left: 2px solid #ccc;
        overflow-y: auto;
        padding: 16px;
        box-sizing: border-box;
        display: none;
      }

      #sidebar h2 {
        margin-top: 0;
        font-size: 18px;
        border-bottom: 2px solid #333;
        padding-bottom: 8px;
      }

      /*
      Varje platskort i sidebaren är en vit ruta med rundade hörn.
      cursor: pointer visar en hand när man håller musen över kortet,
      vilket signalerar att det är klickbart.
      transition skapar en mjuk animation när skuggan ändras vid hover.
    */
      .platskort {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: box-shadow 0.2s;
      }

      .platskort:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      .platskort h3 {
        margin: 0 0 6px 0;
        font-size: 14px;
        color: #222;
      }

      .platskort p {
        margin: 3px 0;
        font-size: 12px;
        color: #555;
      }

      /*
      Etikett som visar platsens kategori (t.ex. Museum, Bibliotek).
      border-radius: 12px ger den en pill-formad rundad stil.
    */
      .etikett {
        display: inline-block;
        background: #007bff;
        color: white;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 12px;
        margin-top: 6px;
      }

      /*
      Knapprade som flyter ovanpå kartan längst upp i mitten.
      position: absolute och z-index: 1000 gör att den ligger
      ovanpå kartan utan att påverka kartans layout.
      transform: translateX(-50%) centrerar raden exakt i mitten.
    */
      #knappar {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      /*
      Grundstil för alla knappar i applikationen.
      box-shadow ger en lätt skugga som får knapparna att se
      upphöjda ut mot kartbakgrunden.
    */
      button {
        padding: 10px 18px;
        background: white;
        border: 2px solid #333;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }

      button:hover {
        background: #f0f0f0;
      }

      /*
      Rensa-knappen är röd för att signalera en destruktiv åtgärd
      (tar bort allt från kartan).
    */
      #rensa {
        border-color: red;
        color: red;
      }

      /*
      Knappen för Task 2 är blå för att skilja den från Task 1-knapparna.
    */
      #visaPlatser {
        border-color: #007bff;
        color: #007bff;
      }

      /*
      Knappen för Task 3 är grön eftersom den visar
      matbutiker och buffertzoner i gröna nyanser.
    */
      #visaSupermarkets {
        border-color: green;
        color: green;
      }

      /*
  Knappen för Task 4 får en lila färg för att
  skilja den visuellt från övriga knappar.
*/
      #visaBild {
        border-color: purple;
        color: purple;
      }

      #visaFuel {
        border-color: darkred;
        color: darkred;
      }

      /*
  Knappen för Task 5.1 får en orange färg för att
  representera munkens färg och skilja den från Task 5-knappen.
*/
      #visaDonut {
        border-color: darkorange;
        color: darkorange;
      }

      /*
  Knappen för väderfunktionen får en ljusblå färg för att
  representera himmel och väder.
*/
      #visaVäder {
        border-color: steelblue;
        color: steelblue;
      }

      /*
  Knappen för k-means klustring får en mörkgrön färg
  för att representera skolor och utbildning.
*/
      #visaKmeans {
        border-color: darkgreen;
        color: darkgreen;
      }

      /*
  Knappen för skolbuffertar får en mörkblå färg för att
  representera stadsplanering och befolkningsanalys.
*/
      #visaBuffer {
        border-color: darkblue;
        color: darkblue;
      }
    </style>
  </head>
  <body>
    <!--
    Knapprad som ligger ovanpå kartan.
    Varje knapp anropar en specifik JavaScript-funktion
    som hanterar ett eget kartlager.
  -->
    <div id="knappar">
      <!--
      Task 1 – knappar för att rita geometriska former på kartan.
      Varje knapp skapar en ny feature och visar en popup med
      information och bild när man klickar på den.
    -->
      <button onclick="laggTillPunkt()">📍 Punkt</button>
      <button onclick="laggTillLinje()">📏 Linje</button>
      <button onclick="laggTillPolygon()">🔷 Polygon</button>
      <button id="rensa" onclick="rensaKarta()">🗑 Rensa</button>
      <button id="visaFuel" onclick="visaTask5()">⛽ Bränslestationer</button>
      <button id="visaDonut" onclick="visaTask5_1()">🍩 Donut-kluster</button>
      <button id="visaKmeans" onclick="visaTask7()">🏫 K-means</button>
      <button id="visaBuffer" onclick="visaTask8()">🏘 Skolbuffertar</button>

      <!--
      Task 2 – visar 5 utvalda platser i Stockholm som markörer
      och öppnar en sidebar med detaljerad information om varje plats.
      Klick igen döljer sidebaren och tar bort markörerna.
    -->
      <button id="visaPlatser" onclick="visaTask2()">🏙 Visa 5 platser</button>

      <!--
      Task 3 – laddar supermarket.geojson från servern och visar
      butikerna på kartan med 1km buffertzoner.
      Gröna buffers överlappar inte, blå buffers överlappar.
      Klick igen tar bort alla supermarket-lager.
    -->
      <button id="visaSupermarkets" onclick="visaTask3()">
        🛒 Supermarkets
      </button>

      <!--
  Task 4 – lägger en historisk kartbild ovanpå bakgrundskartan
  över Stockholm. Klick igen tar bort överlagringen.
-->
      <button id="visaBild" onclick="visaTask4()">🖼 Bildöverlagring</button>

      <!--
  Knapp som hämtar aktuell väderdata och femtonsdygns-prognos
  för fem svenska städer och visar informationen både som
  markörer på kartan och som detaljkort i sidebaren.
-->
      <button id="visaVäder" onclick="visaTask6()">🌤 Väder</button>
    </div>

    <!--
    Behållaren där Leaflet ritar kartan.
    Leaflet hittar detta element via id="map" när L.map('map') anropas.
  -->
    <div id="map"></div>

    <!--
    Sidebar för Task 2.
    Innehåller klickbara kort för varje plats i Stockholm.
    Är dold från start (display: none i CSS) och visas
    när användaren klickar på "Visa 5 platser"-knappen.
  -->
    <div id="sidebar">
      <h2>📍 Stockholm – 5 platser</h2>
      <div id="sidebar-innehall"></div>
    </div>

    <!--
    Leaflet JavaScript-biblioteket.
    Placeras efter HTML-elementen så att #map-elementet
    redan finns i dokumentet när Leaflet försöker hitta det.
  -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
      // ═══════════════════════════════════════════════════════════
      // KARTA
      //
      // L.map('map') skapar en interaktiv karta i elementet med id="map".
      // setView([latitud, longitud], zoomnivå) bestämmer startposition.
      // Stockholm ligger på ungefär 59.332°N, 18.065°E.
      // Zoomnivå 13 ger en bra översikt över innerstaden.
      // ═══════════════════════════════════════════════════════════
      var karta = L.map("map").setView([59.332, 18.065], 13);

      /*
                  Bakgrundskarta från OpenStreetMap.
                  {s} = subdomän för lastbalansering
                  {z} = zoomnivå
                  {x} och {y} = rutkoordinater i kartans rutnät
                */
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(karta);

      // ═══════════════════════════════════════════════════════════
      // LAGERHANTERING
      //
      // aktivaLager är en array som håller koll på alla lager som
      // lagts till av Task 1-knapparna (punkt, linje, polygon).
      // När användaren klickar "Rensa" tas alla dessa lager bort.
      // Task 2 och Task 3 hanterar sina egna lager separat.
      // ═══════════════════════════════════════════════════════════
      var aktivaLager = [];

      /*
                  Lägger till ett lager på kartan och sparar en referens
                  i aktivaLager-arrayen så att det kan tas bort senare.
                */
      function laggTillLager(lager) {
        lager.addTo(karta);
        aktivaLager.push(lager);
      }

      /*
                  Tar bort alla lager i aktivaLager från kartan
                  och tömmer arrayen för att frigöra minne.
                */
      function rensaKarta() {
        // Rensar Task 1-lager (punkt, linje, polygon)
        aktivaLager.forEach(function (l) {
          karta.removeLayer(l);
        });
        aktivaLager.length = 0;

        if (punktLager) {
          karta.removeLayer(punktLager);
          punktLager = null;
        }
        if (linjeLager) {
          karta.removeLayer(linjeLager);
          linjeLager = null;
        }
        if (polygonLager) {
          karta.removeLayer(polygonLager);
          polygonLager = null;
        }

        // Rensar Task 2-lager och stänger sidebaren
        task2Lager.forEach(function (l) {
          karta.removeLayer(l);
        });
        task2Lager = [];
        document.getElementById("sidebar").style.display = "none";

        // Rensar supermarket-lager och buffertzoner
        task3Lager.forEach(function (l) {
          karta.removeLayer(l);
        });
        task3Lager = [];
        task3Visas = false;

        // Rensar bildöverlagringen och kantlinjen
        if (task4Lager) {
          karta.removeLayer(task4Lager);
          task4Lager = null;
        }

        // Rensar bränslestationer med vanligt kluster
        if (task5Lager) {
          karta.removeLayer(task5Lager);
          task5Lager = null;
        }

        // Rensar bränslestationer med donut-kluster
        if (task5_1Lager) {
          karta.removeLayer(task5_1Lager);
          task5_1Lager = null;
        }

        // Rensar vädermarkörer
        task6Lager.forEach(function (l) {
          karta.removeLayer(l);
        });
        task6Lager = [];
        task6Visas = false;

        // Rensar k-means klustermarkörer och centroids
        task7Lager.forEach(function (l) {
          karta.removeLayer(l);
        });
        task7Lager = [];
        task7Visas = false;
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 1 — PUNKT
      //
      // L.marker([lat, lng]) placerar en standardmarkör på kartan.
      // bindPopup() kopplar ett HTML-fönster till markören som
      // visas när användaren klickar på den.
      // openPopup() öppnar popupen direkt utan att behöva klicka.
      // ═══════════════════════════════════════════════════════════

      var punktLager = null;
      var linjeLager = null;
      var polygonLager = null;

      function laggTillPunkt() {
        if (punktLager) {
          karta.removeLayer(punktLager);
          punktLager = null;
          return;
        }
        var markör = L.marker([59.332, 18.065]);

        markör.bindPopup(
          "<b>📍 Stockholms stadshus</b><br>" +
            "Typ: Punkt<br>" +
            "Koordinater: 59.332°N, 18.065°E<br>" +
            "Historiskt rådhus vid Riddarfjärden, invigt 1923.<br>" +
            '<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Stockholm_stadshus.jpg/200px-Stockholm_stadshus.jpg" ' +
            'style="width:200px; margin-top:6px; border-radius:4px"/>',
        );

        punktLager = markör;
        markör.addTo(karta);
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 1 — LINJE
      //
      // L.polyline() tar en lista med koordinatpar och ritar en
      // sammanhängande linje mellan dem.
      // fitBounds() justerar kartans vy så att hela linjen syns,
      // med extra utrymme (padding) runt om.
      // ═══════════════════════════════════════════════════════════
      function laggTillLinje() {
        if (linjeLager) {
          karta.removeLayer(linjeLager);
          linjeLager = null;
          return;
        }
        var punkter = [
          [59.325, 18.05],
          [59.33, 18.065],
          [59.335, 18.08],
          [59.34, 18.09],
        ];

        var linje = L.polyline(punkter, {
          color: "orange",
          weight: 5,
        });

        linje.bindPopup(
          "<b>📏 Promenadstråk – Gamla Stan</b><br>" +
            "Typ: Linje<br>" +
            "Längd: ca 2.8 km<br>" +
            "Scenisk promenad längs vattnet i centrala Stockholm.<br>" +
            '<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Gamla_Stan_from_Riddarfjarden.jpg/200px-Gamla_Stan_from_Riddarfjarden.jpg" ' +
            'style="width:200px; margin-top:6px; border-radius:4px"/>',
        );

        linjeLager = linje;
        linje.addTo(karta);
        karta.fitBounds(linje.getBounds(), { padding: [60, 60] });
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 1 — POLYGON
      //
      // L.polygon() tar en lista med hörnpunkter och ritar en
      // sluten yta. Leaflet stänger automatiskt formen tillbaka
      // till den första punkten.
      // fillOpacity styr genomskinligheten på fyllningen (0 = osynlig, 1 = hel).
      // ═══════════════════════════════════════════════════════════
      function laggTillPolygon() {
        if (polygonLager) {
          karta.removeLayer(polygonLager);
          polygonLager = null;
          return;
        }
        var hörn = [
          [59.34, 18.05],
          [59.345, 18.08],
          [59.335, 18.095],
          [59.325, 18.085],
          [59.322, 18.055],
        ];

        var polygon = L.polygon(hörn, {
          color: "green",
          fillColor: "green",
          fillOpacity: 0.25,
          weight: 3,
        });

        polygon.bindPopup(
          "<b>🔷 Djurgårdens parkområde</b><br>" +
            "Typ: Polygon<br>" +
            "Area: ca 2.1 km²<br>" +
            "Kunglig nationalstadspark med museer och natur.<br>" +
            '<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/13/Djurg%C3%A5rdsbron_Stockholm.JPG/200px-Djurg%C3%A5rdsbron_Stockholm.JPG" ' +
            'style="width:200px; margin-top:6px; border-radius:4px"/>',
        );

        polygonLager = polygon;
        polygon.addTo(karta);
        karta.fitBounds(polygon.getBounds(), { padding: [60, 60] });
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 2 — 5 PLATSER I STOCKHOLM MED SIDEBAR
      //
      // platser är en array med objekt där varje objekt representerar
      // en intressant plats i Stockholm med koordinater och information.
      // Informationen visas både som markör på kartan och som
      // klickbart kort i sidebaren.
      // ═══════════════════════════════════════════════════════════
      var platser = [
        {
          namn: "Vasamuseet",
          lat: 59.328,
          lng: 18.0916,
          typ: "Museum",
          info: "Världsberömt museum med det 400-åriga krigsskeppet Vasa.",
          adress: "Galärvarvsvägen 14, Djurgården",
        },
        {
          namn: "Stockholms stadsbibliotek",
          lat: 59.3429,
          lng: 18.0583,
          typ: "Bibliotek",
          info: "Ikonisk cylinderformad byggnad ritad av Gunnar Asplund, öppnad 1928.",
          adress: "Sveavägen 73, Vasastan",
        },
        {
          namn: "NK – Nordiska Kompaniet",
          lat: 59.334,
          lng: 18.0706,
          typ: "Butik",
          info: "Stockholms mest kända varuhus sedan 1915, centralt på Hamngatan.",
          adress: "Hamngatan 18-20, Norrmalm",
        },
        {
          namn: "Karolinska universitetssjukhuset",
          lat: 59.349,
          lng: 18.034,
          typ: "Sjukhus",
          info: "Ett av Europas största universitetssjukhus med avancerad specialistvård.",
          adress: "Solnavägen 1, Solna",
        },
        {
          namn: "Stockholms universitet",
          lat: 59.365,
          lng: 18.058,
          typ: "Universitet",
          info: "Grundat 1878, ett av Sveriges ledande lärosäten med ca 33 000 studenter.",
          adress: "Universitetsvägen 10, Frescati",
        },
      ];

      /*
                  Separat array för Task 2-markörer så att de inte påverkas
                  av rensa-knappen som bara rensar Task 1-lager.
                */
      var task2Lager = [];

      function visaTask2() {
        var sidebar = document.getElementById("sidebar");
        var innehall = document.getElementById("sidebar-innehall");

        /*
                    Om sidebaren redan är synlig stänger vi den och tar bort
                    alla Task 2-markörer från kartan för att återställa vyn.
                  */
        if (sidebar.style.display === "block") {
          sidebar.style.display = "none";
          task2Lager.forEach(function (l) {
            karta.removeLayer(l);
          });
          task2Lager = [];
          return;
        }

        sidebar.style.display = "block";
        innehall.innerHTML = "";

        /*
                    Loopar igenom platser-arrayen och skapar för varje plats:
                    1. En markör på kartan med popup
                    2. Ett klickbart kort i sidebaren
                  */
        platser.forEach(function (plats) {
          var markör = L.marker([plats.lat, plats.lng]);

          markör.bindPopup(
            "<b>" +
              plats.namn +
              "</b><br>" +
              "<i>" +
              plats.typ +
              "</i><br>" +
              plats.adress +
              "<br>" +
              plats.info,
          );

          markör.addTo(karta);
          task2Lager.push(markör);

          /*
                      Skapar ett HTML-element för platsen i sidebaren.
                      addEventListener('click') zoomar kartan till platsen
                      och öppnar popupen när användaren klickar på kortet.
                    */
          var kort = document.createElement("div");
          kort.className = "platskort";
          kort.innerHTML =
            "<h3>" +
            plats.namn +
            "</h3>" +
            "<p>📍 " +
            plats.adress +
            "</p>" +
            "<p>" +
            plats.info +
            "</p>" +
            '<span class="etikett">' +
            plats.typ +
            "</span>";

          kort.addEventListener("click", function () {
            karta.setView([plats.lat, plats.lng], 16);
            markör.openPopup();
          });

          innehall.appendChild(kort);
        });

        /*
                    Skapar en tillfällig grupp av alla markörer för att
                    kunna beräkna den gemensamma avgränsningsrutan och
                    zooma kartan så att alla 5 platser syns samtidigt.
                  */
        var grupp = L.featureGroup(task2Lager);
        karta.fitBounds(grupp.getBounds(), { padding: [40, 40] });
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 3 — SUPERMARKETS MED GEOJSON OCH 1KM BUFFERTZONER
      //
      // Hämtar supermarket.geojson från Flask-servern och visar
      // varje butik som en cirkelmarkör på kartan.
      //
      // Bufferanalys:
      //   - turf.buffer() skapar en 1km cirkel runt varje butik
      //   - turf.booleanIntersects() kollar om två cirklar överlappar
      //   - Gröna markörer/buffers = butiken ligger isolerat (ingen överlapp)
      //   - Blå markörer/buffers = butiken överlappar minst en annan butik
      // ═══════════════════════════════════════════════════════════
      var task3Lager = [];
      var task3Visas = false;

      function visaTask3() {
        /*
                    Om Task 3 redan visas tar vi bort alla lager och
                    återställer flaggan task3Visas till false.
                  */
        if (task3Visas) {
          task3Lager.forEach(function (l) {
            karta.removeLayer(l);
          });
          task3Lager = [];
          task3Visas = false;
          return;
        }

        /*
                    fetch('/supermarkets') skickar en HTTP GET-förfrågan till
                    Flask-servern som läser supermarket.geojson och returnerar
                    den som JSON. .then() hanterar svaret asynkront när det
                    kommer tillbaka från servern.
                  */
        fetch("/supermarkets")
          .then(function (svar) {
            return svar.json();
          })
          .then(function (data) {
            var features = data.features;

            /*
                        Skapar en 1km buffertzon för varje butik.
                        turf.buffer(feature, radie, {enheter}) returnerar en
                        GeoJSON-polygon som representerar cirkeln.
                        map() skapar en ny array med en buffer per butik.
                      */
            var buffers = features.map(function (feature) {
              return turf.buffer(feature, 1, { units: "kilometers" });
            });

            /*
                        Kontrollerar vilka buffers som överlappar varandra.
                        Vi jämför varje par av buffers (i mot j).
                        Om de överlappar markeras båda indexen som överlappande.
                        new Array(n).fill(false) skapar en array med n st false-värden.
                      */
            var överlappande = new Array(features.length).fill(false);

            for (var i = 0; i < buffers.length; i++) {
              for (var j = i + 1; j < buffers.length; j++) {
                /*
                            turf.booleanIntersects() returnerar true om de två
                            polygonerna delar något gemensamt geografiskt område.
                          */
                if (turf.booleanIntersects(buffers[i], buffers[j])) {
                  överlappande[i] = true;
                  överlappande[j] = true;
                }
              }
            }

            /*
                        Ritar ut varje buffertzon på kartan som en halvtransparent cirkel.
                        Färgen baseras på om bufferten överlappar en annan eller inte.
                        dashArray: '5, 5' skapar en streckad kantlinje.
                      */
            buffers.forEach(function (buffer, index) {
              var färg = överlappande[index] ? "blue" : "green";

              var bufferLager = L.geoJSON(buffer, {
                style: {
                  color: färg,
                  fillColor: färg,
                  fillOpacity: 0.15,
                  weight: 2,
                  dashArray: "5, 5",
                },
              });

              bufferLager.addTo(karta);
              task3Lager.push(bufferLager);
            });

            /*
                        Ritar ut varje supermarket som en cirkelmarkör.
                        GeoJSON lagrar koordinater som [longitud, latitud] (omvänt mot Leaflet),
                        därför vänder vi på dem: koordinater[1] = lat, koordinater[0] = lng.
                      */
            features.forEach(function (feature, index) {
              var koordinater = feature.geometry.coordinates;
              var namn = feature.properties.name || "Okänd butik";
              var färg = överlappande[index] ? "blue" : "green";

              var markör = L.circleMarker([koordinater[1], koordinater[0]], {
                radius: 8,
                color: färg,
                fillColor: färg,
                fillOpacity: 0.9,
                weight: 2,
              });

              /*
                          Popupen visar butikens namn och om dess buffert
                          överlappar en annan butiks buffert eller inte.
                        */
              var status = överlappande[index]
                ? "⚠️ Bufferten överlappar en annan butik"
                : "✅ Bufferten överlappar INTE någon annan butik";

              markör.bindPopup("<b>🛒 " + namn + "</b><br>" + status);

              markör.addTo(karta);
              task3Lager.push(markör);
            });

            /*
                        Zoomar kartan så att alla supermarkets och deras
                        buffertzoner syns inom kartans vy.
                      */
            var grupp = L.featureGroup(task3Lager);
            karta.fitBounds(grupp.getBounds(), { padding: [40, 40] });

            task3Visas = true;
          });
      }

      // ═══════════════════════════════════════════════════════════
      // TASK 5.1 — BRÄNSLESTATIONER MED DONUT-KLUSTER
      //
      // Samma data som Task 5 men klusterikonen är en munkform (donut)
      // uppdelad i färgade sektorer per bränslebolag.
      //
      // iconCreateFunction anropas av MarkerCluster varje gång ett
      // kluster ska ritas. Vi räknar hur många stationer per bolag
      // som finns i klustret och ritar en SVG-cirkel med sektorer.
      //
      // SVG-sektorn beräknas med trigonometri:
      //   x = cx + r * cos(vinkel)
      //   y = cy + r * sin(vinkel)
      // ═══════════════════════════════════════════════════════════
      var task5_1Lager = null;

      // Färgkarta för olika bränslebolag
      var bolagsFärger = {
        Shell: "#ff0000",
        "Circle K": "#cc0000",
        OKQ8: "#f5a623",
        Preem: "#00873c",
        St1: "#003087",
        ST1: "#003087",
        st1: "#003087",
        Tanka: "#9b59b6",
        Ingo: "#1abc9c",
        IDS: "#555555",
      };

      function visaTask5_1() {
        /*
            Om Task 5.1 redan visas tar vi bort klusterlagret
            och återställer variabeln till null.
          */
        if (task5_1Lager) {
          karta.removeLayer(task5_1Lager);
          task5_1Lager = null;
          return;
        }

        /*
            Skapar ett MarkerCluster-lager med en anpassad ikonfunktion.
            iconCreateFunction anropas automatiskt när kluster ska ritas.
            Parametern 'kluster' innehåller information om alla markörer
            som ingår i klustret.
          */
        var donutKluster = L.markerClusterGroup({
          iconCreateFunction: function (kluster) {
            /*
                Hämtar alla markörer i klustret och räknar hur många
                som tillhör varje bränslebolag.
              */
            var markörer = kluster.getAllChildMarkers();
            var bolagsRäkning = {};

            markörer.forEach(function (m) {
              var bolag = m.options.bolag || "Okänt";
              bolagsRäkning[bolag] = (bolagsRäkning[bolag] || 0) + 1;
            });

            var totalt = markörer.length;
            var storlek = totalt < 5 ? 40 : totalt < 10 ? 50 : 60;
            var radie = storlek / 2;
            var inreRadie = radie * 0.5; // Hålet i mitten av munken

            /*
                Bygger SVG-sektorer för varje bränslebolag.
                Varje sektor beräknas med trigonometri utifrån
                hur stor andel av klustret bolaget utgör.
              */
            var sektorer = "";
            var startVinkel = -Math.PI / 2; // Börjar kl 12

            Object.keys(bolagsRäkning).forEach(function (bolag) {
              var andel = bolagsRäkning[bolag] / totalt;
              var slutVinkel = startVinkel + andel * 2 * Math.PI;
              var färg = bolagsFärger[bolag] || "#888888";

              /*
                  Beräknar punkterna för sektorns yttre och inre båge.
                  largeArcFlag = 1 om sektorn är större än 180 grader.
                */
              var x1 = radie + radie * Math.cos(startVinkel);
              var y1 = radie + radie * Math.sin(startVinkel);
              var x2 = radie + radie * Math.cos(slutVinkel);
              var y2 = radie + radie * Math.sin(slutVinkel);
              var ix1 = radie + inreRadie * Math.cos(startVinkel);
              var iy1 = radie + inreRadie * Math.sin(startVinkel);
              var ix2 = radie + inreRadie * Math.cos(slutVinkel);
              var iy2 = radie + inreRadie * Math.sin(slutVinkel);
              var largeArc = andel > 0.5 ? 1 : 0;

              sektorer +=
                '<path d="M ' +
                ix1 +
                " " +
                iy1 +
                " L " +
                x1 +
                " " +
                y1 +
                " A " +
                radie +
                " " +
                radie +
                " 0 " +
                largeArc +
                " 1 " +
                x2 +
                " " +
                y2 +
                " L " +
                ix2 +
                " " +
                iy2 +
                " A " +
                inreRadie +
                " " +
                inreRadie +
                " 0 " +
                largeArc +
                " 0 " +
                ix1 +
                " " +
                iy1 +
                ' Z" fill="' +
                färg +
                '" stroke="white" stroke-width="1"/>';

              startVinkel = slutVinkel;
            });

            /*
                Sätter ihop hela SVG-ikonen med sektorer och
                ett antal i mitten av munken.
              */
            var svg =
              '<svg width="' +
              storlek +
              '" height="' +
              storlek +
              '" ' +
              'xmlns="http://www.w3.org/2000/svg">' +
              sektorer +
              '<circle cx="' +
              radie +
              '" cy="' +
              radie +
              '" r="' +
              inreRadie +
              '" ' +
              'fill="white" stroke="#ccc" stroke-width="1"/>' +
              '<text x="' +
              radie +
              '" y="' +
              (radie + 4) +
              '" ' +
              'text-anchor="middle" font-size="11" font-weight="bold" fill="#333">' +
              totalt +
              "</text>" +
              "</svg>";

            return L.divIcon({
              html: svg,
              className: "",
              iconSize: [storlek, storlek],
              iconAnchor: [radie, radie],
            });
          },
        });

        fetch("/fuel")
          .then(function (svar) {
            return svar.json();
          })
          .then(function (data) {
            data.features.forEach(function (feature) {
              var koordinater = feature.geometry.coordinates;
              var namn = feature.properties.name || "Okänd station";
              var bolag =
                feature.properties.brand ||
                feature.properties.operator ||
                "Okänt";

              /*
                  Sparar bolaget som ett alternativ på markören så att
                  iconCreateFunction kan komma åt det via m.options.bolag.
                */
              var markör = L.marker([koordinater[1], koordinater[0]], {
                bolag: bolag,
              });

              markör.bindPopup("<b>⛽ " + namn + "</b><br>Bolag: " + bolag);
              donutKluster.addLayer(markör);
            });

            task5_1Lager = donutKluster;
            karta.addLayer(task5_1Lager);
            karta.fitBounds(task5_1Lager.getBounds(), { padding: [40, 40] });
          });
      }

      //

      //
      // API-nyckeln krävs för att autentisera anropen mot OpenWeatherMap.
      // ═══════════════════════════════════════════════════════════

      /*
          De fem städer vi hämtar väderdata för, med namn och koordinater.
          Koordinaterna används för att placera markörerna på rätt plats.
        */
      var väderStäder = [
        { namn: "Stockholm", lat: 59.332, lng: 18.065 },
        { namn: "Göteborg", lat: 57.707, lng: 11.967 },
        { namn: "Malmö", lat: 55.605, lng: 13.0 },

        { namn: "Linköping", lat: 58.411, lng: 15.622 },
      ];

      /*
          Din personliga API-nyckel från OpenWeatherMap.
          Krävs för att göra anrop mot deras API.
        */
      var apiNyckel = "bcccb2c9e07fad2de118bea142ac5c80";

      var task6Lager = [];
      var task6Visas = false;

      function visaTask6() {
        /*
            Om vädret redan visas tar vi bort alla markörer
            och stänger sidebaren.
          */
        if (task6Visas) {
          task6Lager.forEach(function (l) {
            karta.removeLayer(l);

          task6Lager = [];
          task6Visas = false;
          document.getElementById("sidebar").style.display = "none";
          return;

        var sidebar = document.getElementById("sidebar");
        var innehall = document.getElementById("sidebar-innehall");
        document.getElementById("sidebar-title") &&

            "🌤 Väder – 5 städer");
        sidebar.style.display = "block";
        innehall.innerHTML = "<p>Hämtar väderdata...</p>";

        var löften = väderStäder.map(function (stad) {
          /*
              Bygger URL:erna för aktuellt väder och prognos.
              units=metric ger temperaturen i Celsius.
              lang=sv ger väderbeskrivningar på svenska.
            */
          var aktuelltUrl =
            "https://api.openweathermap.org/data/2.5/weather?q=" +
            stad.namn +
            ",SE&appid=" +
            apiNyckel +
            "&units=metric&lang=sv";
          var prognosUrl =
            "https://api.openweathermap.org/data/2.5/forecast?q=" +
            stad.namn +
            ",SE&appid=" +
            apiNyckel +
            "&units=metric&lang=sv&cnt=5";

          /*
              Hämtar aktuellt väder och prognos parallellt med Promise.all().
              Om något anrop misslyckas fångas felet och null returneras.
            */
          return Promise.all([
            fetch(aktuelltUrl).then(function (r) {
              return r.json();
            }),
            fetch(prognosUrl).then(function (r) {
              return r.json();
            }),
          ])
            .then(function (resultat) {
              return {
                stad: stad,
                aktuellt: resultat[0],
                prognos: resultat[1],
              };
            })
            .catch(function () {
              return { stad: stad, aktuellt: null, prognos: null };
            });
        });

        /*
            Väntar på att alla städers väderdata har hämtats

        Promise.all(löften).then(function (resultat) {
          innehall.innerHTML = "";

          resultat.forEach(function (r) {

            var fukt = r.aktuellt.main.humidity;

            var beskriv = r.aktuellt.weather[0].description;

            /*

            var kartIkon = L.divIcon({
              html:
                '<div style="background:white;border:2px solid steelblue;border-radius:8px;' +
                "padding:4px 8px;font-size:12px;font-weight:bold;white-space:nowrap;" +
                'box-shadow:0 2px 6px rgba(0,0,0,0.3)">' +
                '<img src="' +
                ikonUrl +
                '" style="width:20px;vertical-align:middle"/>' +
                r.stad.namn +
                " " +
                temp +
                "°C</div>",
              className: "",
              iconAnchor: [60, 20],
            });

            var markör = L.marker([r.stad.lat, r.stad.lng], {
              icon: kartIkon,
            });

            /*
                Prognosrader för de kommande 5 mätpunkterna från API:et.
                Varje mätpunkt är 3 timmar framåt i tiden.
              */
            var prognosHtml = "";
            if (r.prognos && r.prognos.list) {
              r.prognos.list.forEach(function (p) {
                var tid = p.dt_txt.slice(0, 16);
                var temp = Math.round(p.main.temp);
                var desc = p.weather[0].description;
                prognosHtml +=
                  '<div style="font-size:11px;padding:3px 0;border-bottom:1px solid #eee">' +
                  "<b>" +
                  tid +
                  "</b> – " +
                  temp +
                  "°C, " +
                  desc +
                  "</div>";
              });
            }

            markör.bindPopup(
              "<b>🌤 " +
                r.stad.namn +
                "</b><br>" +
                '<img src="' +
                ikonUrl +
                '" style="vertical-align:middle"/>' +
                "<b>" +
                temp +
                "°C</b> – " +
                beskriv +
                "<br>" +
                "🌡 Känns som: " +
                känns +
                "°C<br>" +

      // ═══════════════════════════════════════════════════════════
      // K-MEANS KLUSTRING AV SKOLPLACERINGAR
      //
      // Hämtar skoldata från servern och skickar koordinaterna
      // till Flask-servern som utför k-means klustring i Python.
      //
      // Resultatet visas som färgkodade markörer på kartan där
      // varje färg representerar ett geografiskt kluster.
      // Klustrets centroid (mittpunkt) markeras med en stjärna.
      //
      // Antal kluster (k) kan justeras med knapparna.
      // ═══════════════════════════════════════════════════════════

      /*
          Färger för de olika klustren.
          Varje kluster får en unik färg så de är lätta att skilja åt.
        */
      var klusterFärger = [
        "#e74c3c",
        "#3498db",
        "#2ecc71",
        "#f39c12",
        "#9b59b6",
        "#1abc9c",
        "#e67e22",
        "#e91e63",
      ];

      var task7Lager = [];
      var task7Visas = false;

      function visaTask7(k) {
        /*
            Standardvärde för k är 4 kluster om inget annat anges.
          */
        k = k || 4;

        /*
            Om k-means redan visas och användaren klickar på knappen igen
            tas alla klustermarkörer och centroids bort från kartan.
            Sidebaren stängs också eftersom den visade klusterinformation.
          */
        if (task7Visas) {
          task7Lager.forEach(function (l) {
            karta.removeLayer(l);
          });
          task7Lager = [];
          task7Visas = false;
          document.getElementById("sidebar").style.display = "none";
          return;
        }

        /*
            Hämtar skoldata från Flask-servern som en lista
            med objekt innehållande namn, lat och lng.
          */
        fetch("/schools")
          .then(function (svar) {
            return svar.json();
          })
          .then(function (skolor) {
            var punkter = skolor.map(function (s) {
              return { lat: s.lat, lng: s.lng };
            });

            /*
                Skickar koordinaterna till Flask-serverns /kmeans-route
                som utför k-means algoritmen i Python och returnerar
                vilket kluster varje skola tillhör.
              */
            return fetch("/kmeans", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ punkter: punkter, k: k }),
            })
              .then(function (svar) {
                return svar.json();
              })
              .then(function (resultat) {
                var sidebar = document.getElementById("sidebar");
                var innehall = document.getElementById("sidebar-innehall");
                sidebar.style.display = "block";
                innehall.innerHTML =
                  '<h3 style="margin-bottom:10px">K-means (k=' + k + ")</h3>";

                /*
                  Skapar knappar för att byta antal kluster utan att
                  behöva ladda om sidan.
                */
                var knappHtml =
                  '<div style="display:flex;gap:6px;margin-bottom:12px">';
                [3, 4, 5, 6].forEach(function (val) {
                  knappHtml +=
                    '<button onclick="visaTask7(' +
                    val +
                    ')" ' +
                    'style="padding:4px 10px;background:' +
                    (val === k ? "#333" : "white") +
                    ";" +
                    "color:" +
                    (val === k ? "white" : "#333") +
                    ";border:1px solid #333;" +
                    'border-radius:4px;cursor:pointer">k=' +
                    val +
                    "</button>";
                });
                knappHtml += "</div>";
                innehall.innerHTML += knappHtml;

                /*
                  Ritar ut varje skola som en färgad cirkelmarkör
                  baserat på vilket kluster den tillhör.
                */
                skolor.forEach(function (skola, index) {
                  var kluster = resultat.etiketter[index];
                  var färg = klusterFärger[kluster % klusterFärger.length];

                  var markör = L.circleMarker([skola.lat, skola.lng], {
                    radius: 8,
                    color: färg,
                    fillColor: färg,
                    fillOpacity: 0.9,
                    weight: 2,
                  });

                  markör.bindPopup(
                    "<b>🏫 " +
                      skola.name +
                      "</b><br>" +
                      "Kluster: " +
                      (kluster + 1),
                  );

                  markör.addTo(karta);
                  task7Lager.push(markör);
                });

                /*
                  Ritar ut centroiden för varje kluster som en
                  större markör med klustrets nummer i mitten.
                */
                resultat.centroids.forEach(function (centroid, index) {
                  var färg = klusterFärger[index % klusterFärger.length];

                  var centroidIkon = L.divIcon({
                    html:
                      '<div style="background:' +
                      färg +
                      ";color:white;width:28px;height:28px;" +
                      "border-radius:50%;display:flex;align-items:center;justify-content:center;" +
                      "font-weight:bold;font-size:13px;border:3px solid white;" +
                      'box-shadow:0 2px 6px rgba(0,0,0,0.4)">' +
                      (index + 1) +
                      "</div>",
                    className: "",
                    iconSize: [28, 28],
                    iconAnchor: [14, 14],
                  });

                  var centroidMarkör = L.marker(centroid, {
                    icon: centroidIkon,
                  });
                  centroidMarkör.bindPopup(
                    "<b>Centroid " + (index + 1) + "</b>",
                  );
                  centroidMarkör.addTo(karta);
                  task7Lager.push(centroidMarkör);

                  /*
                    Lägger till ett kort i sidebaren för varje kluster
                    med information om centroidens position.
                  */
                  var kort = document.createElement("div");
                  kort.className = "platskort";
                  kort.style.borderLeft = "4px solid " + färg;
                  kort.innerHTML =
                    '<h3 style="color:' +
                    färg +
                    '">Kluster ' +
                    (index + 1) +
                    "</h3>" +
                    "<p>📍 Centroid: " +
                    centroid[0].toFixed(3) +
                    "°N, " +
                    centroid[1].toFixed(3) +
                    "°E</p>";
                  innehall.appendChild(kort);
                });

                var grupp = L.featureGroup(task7Lager);
                karta.fitBounds(grupp.getBounds(), { padding: [40, 40] });
                task7Visas = true;
              });
          });
      }

      // ═══════════════════════════════════════════════════════════
      // SKOLBUFFERTAR OCH BEFOLKNINGSANALYS
      //
      // Hämtar skolors och befolkningspunkters koordinater från
      // Flask-servern och utför en geografisk bufferanalys.
      //
      // Analys:
      //   1. Skapar 2km buffertzoner runt varje skola med Turf.js
      //   2. Kontrollerar vilka befolkningspunkter som ligger
      //      utanför alla skolbuffertar
      //   3. Markerar dessa punkter med röd färg på kartan
      //   4. Gröna punkter = inom 2km från en skola
      //   5. Röda punkter = mer än 2km från närmaste skola
      // ═══════════════════════════════════════════════════════════
      var task8Lager = [];
      var task8Visas = false;

      function visaTask8() {
        /*
    Om analysen redan visas tar vi bort alla lager
    och stänger sidebaren.
  */
        if (task8Visas) {
          task8Lager.forEach(function (l) {
            karta.removeLayer(l);
          });
          task8Lager = [];
          task8Visas = false;
          document.getElementById("sidebar").style.display = "none";
          return;
        }

        /*
    Hämtar både skoldata och befolkningsdata parallellt
    med Promise.all() för att minimera väntetiden.
  */
        Promise.all([
          fetch("/schools").then(function (r) {
            return r.json();
          }),
          fetch("/population").then(function (r) {
            return r.json();
          }),
        ]).then(function (resultat) {
          var skolor = resultat[0];
          var befolkning = resultat[1];

          /*
      Skapar en 2km buffertzon runt varje skola med Turf.js.
      Buffertarna används sedan för att kontrollera om
      befolkningspunkter ligger inom täckningsområdet.
    */
          var buffertar = skolor.map(function (skola) {
            var punkt = turf.point([skola.lng, skola.lat]);
            return turf.buffer(punkt, 2, { units: "kilometers" });
          });

          /*
      Ritar ut buffertzoner på kartan som halvtransparenta
      blå cirklar för att visualisera skolornas täckningsområde.
    */
          buffertar.forEach(function (buffer) {
            var bufferLager = L.geoJSON(buffer, {
              style: {
                color: "#3498db",
                fillColor: "#3498db",
                fillOpacity: 0.08,
                weight: 1.5,
                dashArray: "5, 5",
              },
            });
            bufferLager.addTo(karta);
            task8Lager.push(bufferLager);
          });

          /*
      Ritar ut skolornas positioner som blå markörer
      så att de syns tydligt på kartan.
    */
          skolor.forEach(function (skola) {
            var markör = L.circleMarker([skola.lat, skola.lng], {
              radius: 6,
              color: "#2980b9",
              fillColor: "#2980b9",
              fillOpacity: 0.9,
              weight: 2,
            });
            markör.bindPopup("<b>🏫 " + skola.name + "</b><br>Skola");
            markör.addTo(karta);
            task8Lager.push(markör);
          });

          /*
      Kontrollerar varje befolkningspunkt om den ligger
      inom någon av skolans buffertzoner med
      turf.booleanPointInPolygon().
    */
          var inomBuffer = 0;
          var utomBuffer = 0;
          var utomPunkter = [];

          befolkning.forEach(function (person) {
            var punkt = turf.point([person.lng, person.lat]);
            var täckt = false;

            /*
        Loopar igenom alla buffertar och kontrollerar om
        befolkningspunkten ligger inom någon av dem.
        Avslutar loopen så fort en träff hittas.
      */
            for (var i = 0; i < buffertar.length; i++) {
              if (turf.booleanPointInPolygon(punkt, buffertar[i])) {
                täckt = true;
                break;
              }
            }

            /*
        Gröna markörer = befolkningspunkter inom 2km från en skola.
        Röda markörer = befolkningspunkter mer än 2km från närmaste skola.
      */
            var färg = täckt ? "green" : "red";
            if (täckt) {
              inomBuffer++;
            } else {
              utomBuffer++;
              utomPunkter.push(person);
            }

            var markör = L.circleMarker([person.lat, person.lng], {
              radius: 7,
              color: färg,
              fillColor: färg,
              fillOpacity: 0.85,
              weight: 2,
            });

            markör.bindPopup(
              "<b>👥 " +
                person.name +
                "</b><br>" +
                (täckt
                  ? "✅ Inom 2km från en skola"
                  : "❌ Mer än 2km från närmaste skola"),
            );

            markör.addTo(karta);
            task8Lager.push(markör);
          });

          /*
      Visar en sammanfattning i sidebaren med statistik
      om täckningsgraden och en lista över icke-täckta punkter.
    */
          var sidebar = document.getElementById("sidebar");
          var innehall = document.getElementById("sidebar-innehall");
          sidebar.style.display = "block";
          innehall.innerHTML =
            "<h3>Skolbuffertar 2km</h3>" +
            '<div class="platskort">' +
            "<p>🏫 Antal skolor: <b>" +
            skolor.length +
            "</b></p>" +
            "<p>👥 Antal befolkningspunkter: <b>" +
            befolkning.length +
            "</b></p>" +
            '<p style="color:green">✅ Inom 2km från skola: <b>' +
            inomBuffer +
            "</b></p>" +
            '<p style="color:red">❌ Utanför 2km från skola: <b>' +
            utomBuffer +
            "</b></p>" +
            "</div>" +
            '<h3 style="margin-top:12px">Ej täckta områden:</h3>';

          utomPunkter.forEach(function (p) {
            var kort = document.createElement("div");
            kort.className = "platskort";
            kort.style.borderLeft = "4px solid red";
            kort.innerHTML =
              "<h3>" +
              p.name +
              "</h3>" +
              "<p>📍 " +
              p.lat.toFixed(3) +
              "°N, " +
              p.lng.toFixed(3) +
              "°E</p>";
            kort.addEventListener("click", function () {
              karta.setView([p.lat, p.lng], 13);
            });
            innehall.appendChild(kort);
          });

          var grupp = L.featureGroup(task8Lager);
          karta.fitBounds(grupp.getBounds(), { padding: [40, 40] });
          task8Visas = true;
        });
      }
    </script>
  </body>
</html>
